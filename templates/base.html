<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic AI Log Auditing Platform</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <h1>Agentic AI Log Auditing & Analysis Platform</h1>
            <p>Production-grade observability with ML + LLM insights</p>
        </div>
        <nav class="main-nav">
            <a href="/upload" class="{% if active_page == 'upload' %}active{% endif %}">Upload</a>
            <a href="/analytics" class="{% if active_page == 'analytics' %}active{% endif %}">Analytics</a>
            <a href="/timeline" class="{% if active_page == 'timeline' %}active{% endif %}">Timeline</a>
            <a href="/insights" class="{% if active_page == 'insights' %}active{% endif %}">AI Insights</a>
            <a href="/assistant" class="{% if active_page == 'assistant' %}active{% endif %}">Assistant</a>
            <a href="/realtime" class="{% if active_page == 'realtime' %}active{% endif %}">Realtime</a>
        </nav>
    </header>

    <main class="page-main">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
